<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シェア会アーカイブ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', 'Yu Gothic', 'Hiragino Sans', sans-serif;
  background: #f0f5f1; color: #1a2e23;
  -webkit-font-smoothing: antialiased;
}
.frame { max-width: 480px; margin: 0 auto; min-height: 100vh; }

.page-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px; border-bottom: 1px solid #e2ebe6;
  background: #fff;
}
.back-btn {
  font-size: 14px; color: #2d8a4e; text-decoration: none;
  font-weight: 500;
}
.page-title { font-size: 16px; font-weight: 700; }

.archive-list { padding: 12px 16px; }

.archive-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid #e2ebe6;
  text-decoration: none; color: #1a2e23;
}
.archive-item:last-child { border-bottom: none; }

.archive-thumb {
  width: 96px; height: 54px; border-radius: 6px; background: #111;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.archive-thumb-play {
  width: 0; height: 0;
  border-top: 10px solid transparent;
  border-bottom: 10px solid transparent;
  border-left: 16px solid rgba(255,255,255,0.85);
  margin-left: 3px;
}

.archive-meta { flex: 1; min-width: 0; }
.archive-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.archive-date { font-size: 12px; color: #8fa89b; }
.archive-arrow { color: #8fa89b; font-size: 16px; flex-shrink: 0; }

.empty-msg {
  text-align: center; padding: 40px 16px;
  font-size: 14px; color: #8fa89b;
}
.footer { text-align: center; font-size: 10px; color: #8fa89b; padding: 24px 0; }
</style>
</head>
<body>
<div class="frame">
  <div class="page-header">
    <a class="back-btn" id="backBtn">&larr; 戻る</a>
    <span class="page-title">シェア会アーカイブ</span>
  </div>
  <div class="archive-list" id="archiveList">
    <div class="empty-msg">読み込み中...</div>
  </div>
  <div class="footer">Session Manager</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('t');
if (!token) location.href = '/';

document.getElementById('backBtn').href = '/my/?t=' + encodeURIComponent(token);

async function loadArchives() {
  try {
    const res = await fetch('/api/archives?token=' + encodeURIComponent(token));
    if (!res.ok) { showEmpty(); return; }
    const archives = await res.json();
    render(archives);
  } catch (e) {
    showEmpty();
  }
}

function showEmpty() {
  document.getElementById('archiveList').innerHTML = '<div class="empty-msg">閲覧できるアーカイブはありません</div>';
}

function render(archives) {
  const el = document.getElementById('archiveList');
  if (!archives || archives.length === 0) { showEmpty(); return; }

  el.innerHTML = archives.map(a => `
    <a class="archive-item" href="${esc(a.url)}" target="_blank" rel="noopener">
      <div class="archive-thumb">
        <div class="archive-thumb-play"></div>
      </div>
      <div class="archive-meta">
        <div class="archive-name">${esc(a.title)}</div>
        <div class="archive-date">${esc(a.date)}</div>
      </div>
      <span class="archive-arrow">&#8250;</span>
    </a>
  `).join('');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadArchives();
</script>
</body>
</html>
